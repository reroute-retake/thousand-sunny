---
# Thousand Sunny services, grouped by stack (doc 03). hrefs use *.sunny.home (ct-proxy Caddy);
# siteMonitor pings the internal IP:port directly for reliable up/down status.
# API "widget:" blocks are commented — uncomment after setting the matching HOMEPAGE_VAR_* in .env.

# NOTE: mgmt-VLAN siteMonitors (OPNsense/AdGuard 10.10.10.1, Proxmox 10.10.10.2) require the
# narrow "VLAN 20 → Mgmt" monitoring exception in docs/02-network.md — without it they show offline.
- Network:
    - OPNsense:
        href: https://opnsense.sunny.home
        description: Firewall · routing · DNS (bartolomeo)
        icon: opnsense.png
        siteMonitor: https://10.10.10.1
    - AdGuard Home:
        href: http://10.10.10.1:3000
        description: DNS filtering + Unbound
        icon: adguard-home.png
        siteMonitor: http://10.10.10.1:3000
    - Proxmox:
        href: https://proxmox.sunny.home
        description: Hypervisor (poneglyph)
        icon: proxmox.png
        siteMonitor: https://10.10.10.2:8006
        # widget:
        #   type: proxmox
        #   url: https://10.10.10.2:8006
        #   username: api@pam!homepage
        #   password: {{HOMEPAGE_VAR_PROXMOX_TOKEN}}

- ct-proxy:
    - Vaultwarden:
        href: https://vault.sunny.home
        description: Password vault
        icon: vaultwarden.png
        siteMonitor: http://10.10.20.9:8222
    - Authelia:
        href: https://auth.sunny.home
        description: SSO + MFA
        icon: authelia.png
        siteMonitor: http://10.10.20.9:9091
    - CrowdSec:
        href: https://github.com/reroute-retake/thousand-sunny/blob/main/docs/11-security.md
        description: IPS (LAPI 8080 · OPNsense bouncer)
        icon: crowdsec.png
        siteMonitor: http://10.10.20.9:8080

