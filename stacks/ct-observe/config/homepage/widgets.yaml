---
# Top info widgets.
- greeting:
    text_size: 4xl
    text: "🌞 Thousand Sunny"

- datetime:
    text_size: xl
    format:
      dateStyle: medium
      timeStyle: short
      hourCycle: h23

# NOTE: this shows the ct-observe CONTAINER/LXC view (systeminformation inside Docker),
# NOT the poneglyph hypervisor's full RAM/CPU. For real host stats, use the Proxmox
# widget in services.yaml (needs a token + the VLAN 20→Mgmt monitoring exception, doc 02).
- resources:
    label: ct-observe
    cpu: true
    memory: true
    disk: /

# Optional: pull live status from the external watcher (crowsnest) or Uptime Kuma.
# - uptimekuma:
#     url: http://10.10.20.16:3001
#     slug: thousand-sunny

- search:
    provider: duckduckgo
    focus: false
    target: _blank
